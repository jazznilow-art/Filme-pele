<style>
/* === Estilo do Card === */
.film-card {
  max-width: 900px;
  margin: 40px auto;
  border: 1px solid #ccc;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  overflow: hidden;
  font-family: Arial, sans-serif;
  background-color: #fff;
}
.film-card-header { display: flex; align-items: center; padding: 20px; }
.film-card-header img { width: 250px; border-radius: 12px; margin-right: 20px; }
.film-card-header h1 { font-size: 2em; margin: 0; }
.film-card-description { padding: 0 20px 20px 20px; line-height: 1.5em; }
.film-frames { display: flex; overflow-x: auto; padding: 0 20px 20px 20px; gap: 10px; }
.film-frames img { width: 180px; border-radius: 8px; flex-shrink: 0; }
.film-team { display: flex; flex-wrap: wrap; gap: 20px; padding: 0 20px 20px 20px; align-items: center; }
.film-team img { width: 100px; border-radius: 50%; }
.film-team div { text-align: center; font-size: 0.9em; }
.film-links { padding: 0 20px 20px 20px; }
.film-links a { margin-right: 15px; color: #1a73e8; text-decoration: none; }
.film-links a:hover { text-decoration: underline; }
</style>
</head>

<body>

<div class="film-card">
  <div class="film-card-header">
    <img id="poster" src="" alt="Poster do filme">
    <h1 id="title"></h1>
  </div>

  <div class="film-card-description">
    <p id="description"></p>
  </div>

  <h2 style="padding:0 20px;">Frames do filme</h2>
  <div class="film-frames" id="frames"></div>

  <h2 style="padding:0 20px;">Equipe</h2>
  <div class="film-team" id="team"></div>

  <div class="film-links" id="links"></div>
</div>

<script>
// === Conexão com JSON-LD ===
const data = JSON.parse(document.getElementById('movie-data').textContent);

// Poster e título
document.getElementById('poster').src = data.image[0];
document.getElementById('title').textContent = data.name;
document.getElementById('description').textContent = data.description;

// Frames
const framesContainer = document.getElementById('frames');
data.image.slice(1).forEach(url => {
  const img = document.createElement('img');
  img.src = url;
  framesContainer.appendChild(img);
});

// Equipe: diretores + ator
const teamContainer = document.getElementById('team');
[...data.director, ...data.actor].forEach(person => {
  const div = document.createElement('div');
  div.innerHTML = `<img src="${person.image}" alt="${person.name}"><p>${person.name}</p>`;
  teamContainer.appendChild(div);
});

// Links
const linksContainer = document.getElementById('links');
linksContainer.innerHTML = `
  <a href="${data.trailer.contentUrl}" target="_blank">Assista ao trailer</a>
  <a href="https://www.imdb.com/title/tt35727739/" target="_blank">IMDb</a>
  <a href="https://www.themoviedb.org/movie/1297307-o-carnaval-e-de-pele" target="_blank">TMDB</a>
`;
</script>

</body>
